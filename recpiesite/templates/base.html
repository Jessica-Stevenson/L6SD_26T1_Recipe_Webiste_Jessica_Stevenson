{% load static %}
<!DOCTYPE html>
<html>
<head>
    <title>Recpie</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" 
        rel="stylesheet">

    <link rel="stylesheet" href="{% static 'recpiestatic/style.css' %}">
</head>
<body>

    <nav class="navbar navbar-expand-sm navbar-dark custom-navbar">
        <div class="container">

            <div class="d-flex align-items-center">
                <a class="navbar-brand me-4 d-flex align-items-center" href="{% url 'home' %}">
                    <img src="{% static 'recpiestatic/Logoagian.png' %}" 
                        alt="Logo" 
                        class="logo-img me-2">
                </a>


                <a class="nav-link text-white me-3" href="{% url 'holidays' %}">Holidays</a>
                <a class="nav-link text-white" href="{% url 'health_diet' %}">Diet and Health</a>

            </div>

            <div class="d-flex align-items-center ms-auto">
                <div class="nav-item dropdown me-3">
                    <a class="nav-link dropdown-toggle text-white" href="#" role="button" data-bs-toggle="dropdown" aria-expanded="false">
                        Daily Recipe
                    </a>
                    <ul class="dropdown-menu">
                        <li><a class="dropdown-item" href="{% url 'breakfast' %}">Breakfast</a></li>
                        <li><a class="dropdown-item" href="{% url 'lunch' %}">Lunch</a></li>
                        <li><a class="dropdown-item" href="{% url 'dinner' %}">Dinner</a></li>
                    </ul>
                </div>
                {% if user.is_authenticated %}
                    <a class="nav-link text-white" href="{% url 'profile' %}">
                        <span class="text-white me-3">
                            {{ user.username }}
                        </span>
                    </a>
                    <form method="post" action="{% url 'logout' %}" class="d-inline">
                        {% csrf_token %}
                        <button type="submit" class="btn btn-link nav-link text-white p-0">
                            Logout
                        </button>
                    </form>
                {% else %}
                    <a class="nav-link text-white me-3" href="{% url 'login' %}">
                        Login
                    </a>
                    <a class="nav-link text-white" href="{% url 'signup' %}">
                        Sign Up
                    </a>
                {% endif %}
            </div>

        </div>
    </nav>

    <div class="container mt-4">
        {% block content %}
        {% endblock %}
    </div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
