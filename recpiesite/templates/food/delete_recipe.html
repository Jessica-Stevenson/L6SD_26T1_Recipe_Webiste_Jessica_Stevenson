{% extends 'base.html' %}

{% block content %}

<div class="container mt-4 text-center">

<h3>Delete Recipe</h3>

<p>Are you sure you want to delete <strong>{{ recipe.title }}</strong>?</p>

<form method="POST">
    {% csrf_token %}
    <button class="btn btn-danger">Yes, Delete</button>
    <a href="{% url 'recpie_detail' recipe.id %}" class="btn btn-secondary">Cancel</a>
</form>

</div>

{% endblock %}
